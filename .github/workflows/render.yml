name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  render:
    name: Render Video on Cloud
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Cache Remotion Browser
        id: cache-remotion-browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/remotion
          key: ${{ runner.os }}-remotion-browser

      - name: Install Chrome dependencies (for Headless Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg

      - name: Install Remotion Browser
        if: steps.cache-remotion-browser.outputs.cache-hit != 'true'
        run: bunx remotion browser install

#      - name: Render Main Video
#        run: npx remotion render Main out/video.mp4 --no-sandbox

#      - name: Render Military Map Video
#        run: npx remotion render MilitaryMap out/military_map.mp4 --no-sandbox

      - name: Render Pakistan Map Video
        run: bunx remotion render PakistanMap out/pakistan_map.mp4 --no-sandbox

#      - name: Render Russian Forest Video
#        run: bunx remotion render RussianForest out/russian_forest.mp4 --no-sandbox

      - name: Upload Video Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remotion-video
          path: |
            out/pakistan_map.mp4
