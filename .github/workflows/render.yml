name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  render:
    name: Render Video on Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Remotion Browser
        id: cache-remotion-browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/remotion
          key: ${{ runner.os }}-remotion-browser

      - name: Install Chrome dependencies (for Headless Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg

      - name: Install Remotion Browser
        if: steps.cache-remotion-browser.outputs.cache-hit != 'true'
        run: npx remotion browser install

#      - name: Render Main Video
#        run: npx remotion render Main out/video.mp4 --no-sandbox

#      - name: Render Military Map Video
#        run: npx remotion render MilitaryMap out/military_map.mp4 --no-sandbox

      - name: Render Pakistan Map Video
        run: npx remotion render PakistanMap out/pakistan_map.mp4 --no-sandbox

#      - name: Render Russian Forest Video
#        run: npx remotion render RussianForest out/russian_forest.mp4 --no-sandbox

      - name: Upload Video Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remotion-video
          path: |
            out/pakistan_map.mp4
